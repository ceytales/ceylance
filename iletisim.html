<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Ceren Ceylan</title>
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
    <style>
        /* --- GENEL --- */
        body {
            margin: 0;
            background-color: #000;
            background-image: url('arka-plan.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInPage 1.5s ease-in-out;
        }

        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MENÜ (HEADER) --- */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 1000;
            position: sticky;
            top: 0;
            transition: 0.3s ease;
        }

        .logo { 
            font-family: 'Mrs Saint Delafield', cursive; 
            font-size: 3.5rem; 
            text-decoration: none; 
            color: #fff;
            display: inline-block;
            transition: 0.5s;
        }
        .logo:hover {
            transform: scale(1.1) rotate(-3deg);
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.8rem; 
            letter-spacing: 2px; 
            position: relative;
            padding-bottom: 5px;
            transition: 0.4s;
        }
        .nav-links a:hover { letter-spacing: 4px; color: #ccc; }
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: 0;
            left: 0;
            background: #fff;
            transition: 0.4s ease;
        }
        .nav-links a:hover::after { width: 100%; }

        .social-icons { display: flex; gap: 15px; align-items: center; }
        .social-icons img { width: 22px; transition: 0.3s; opacity: 0.8; }
        .social-icons a:hover img { 
            transform: translateY(-5px); 
            opacity: 1; 
            filter: drop-shadow(0 0 8px #fff); 
        }

        /* --- İLETİŞİM İÇERİK --- */
        .contact-wrapper {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 20px;
            margin-bottom: 40px;
            font-weight: normal;
            text-transform: uppercase;
            animation: slideUp 1s ease-out forwards;
        }

        .contact-description {
            font-style: italic;
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 60px;
            max-width: 500px;
            line-height: 1.6;
            animation: slideUp 1.2s ease-out forwards;
            opacity: 0;
            padding: 0 10px;
        }

        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            animation: slideUp 1.5s ease-out 0.4s forwards;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            transition: all 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .contact-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .contact-card:hover::before {
            left: 100%;
        }

        .contact-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .contact-card span {
            font-size: 1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            word-break: break-all; /* E-posta adresi mobilde taşmasın diye */
        }

        /* --- FOOTER --- */
        footer {
            padding: 40px;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.2;
            letter-spacing: 2px;
            width: 100%;
        }

        /* ==========================================================================
           📱 MOBİL VE TABLET UYUMLULUK AYARLARI (RESPONSIVE)
           ========================================================================== */
        @media (max-width: 768px) {
            header {
                padding: 15px 30px;
                flex-direction: column;
                gap: 15px;
                background: rgba(0,0,0,0.8);
            }
            .logo { font-size: 2.8rem; }
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; }
            
            .contact-wrapper { padding: 50px 0; }
            h1 { font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 30px; }
            .contact-description { margin-bottom: 40px; font-size: 1rem; }
            .contact-card { padding: 20px; }
            .contact-card span { font-size: 0.9rem; letter-spacing: 2px; }
        }

        @media (max-width: 480px) {
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.75rem; letter-spacing: 1px; }
            h1 { font-size: 2rem; letter-spacing: 6px; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Ceren Ceylan</a>
    <div class="nav-links">
        <a href="denemeler.html">DENEMELER</a>
        <a href="hakkimda.html">HAKKIMDA</a>
        <a href="album.html">ALBÜM</a>
        <a href="iletisim.html">İLETİŞİM</a>
        <div class="social-icons">
            <a href="https://www.instagram.com/ceylance13" target="_blank">
                <img src="instagram-logo.png" alt="Instagram">
            </a>
            <a href="https://whatsapp.com/channel/0029Vb6ljN6FcowBLg3qWW2S" target="_blank">
                <img src="whatsapp-logo.png" alt="WhatsApp">
            </a>
        </div>
    </div>
</header>

<div class="contact-wrapper">
    <h1>İLETİŞİM</h1>
    <p class="contact-description">"Bir kelimeyle başlar her şey; bazen bir mektup, bazen bir mesaj..."</p>
    
    <div class="contact-methods">
        <a href="https://www.instagram.com/ceylance13" target="_blank" class="contact-card">
            <span>INSTAGRAM</span>
        </a>
        
        <a href="https://whatsapp.com/channel/0029Vb6ljN6FcowBLg3qWW2S" target="_blank" class="contact-card">
            <span>WHATSAPP KANALI</span>
        </a>
        
        <a href="mailto:cerenceylan.yazar@gmail.com" class="contact-card">
            <span>cerenceylan.yazar@gmail.com</span>
        </a>
    </div>
</div>

<footer>© 2024 CEREN CEYLAN | TÜM HAKLARI SAKLIDIR</footer>

</body>
</html>
