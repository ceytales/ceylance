<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hüma Kuşu | Okuma Sayfası</title>
    <link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
    <style>
        /* --- GENEL AYARLAR --- */
        body {
            margin: 0;
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('arka-plan.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ccc;
            font-family: 'Times New Roman', Times, serif;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HEADER --- */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .back-link { color: #fff; text-decoration: none; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .back-link:hover { text-shadow: 0 0 10px #fff; opacity: 0.8; }
        .logo-small { font-family: 'Mrs Saint Delafield', cursive; font-size: 2.2rem; color: #fff; text-decoration: none; }

        /* --- OKUMA KONTEYNERI --- */
        .read-container {
            max-width: 750px;
            width: 90%;
            padding: 80px 0;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chapter-header { text-align: center; margin-bottom: 60px; }
        .chapter-header h1 { font-size: 2.2rem; letter-spacing: 6px; color: #fff; font-weight: normal; text-transform: uppercase; }

        /* --- ŞİİR & METİN --- */
        .poem {
            text-align: center;
            font-style: italic;
            margin: 50px 0;
            color: #fff;
            font-size: 1.1rem;
            line-height: 2.2;
            white-space: pre-line;
        }

        .content {
            text-align: left;
            font-size: 1.1rem;
            white-space: pre-line;
            color: #bbb;
        }

        /* --- NAVİGASYON BUTONLARI (ÇİRKİN MAVİLİĞE SON) --- */
        .chapter-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        .nav-btn {
            color: #fff !important; /* Mavi rengi zorla beyaz yapıyoruz */
            text-decoration: none !important; /* Alt çizgiyi kaldırıyoruz */
            font-size: 0.7rem;
            letter-spacing: 3px;
            padding: 12px 25px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            transition: 0.5s;
            background: transparent;
            text-transform: uppercase;
        }

        .nav-btn:hover {
            background: #fff;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            border-color: #fff;
        }

        .nav-btn.hidden { visibility: hidden; }

        footer { padding: 80px 0; text-align: center; font-size: 0.7rem; opacity: 0.2; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <a href="kitap-detay-huma.html" class="back-link">❮ BÖLÜMLER</a>
    <a href="index.html" class="logo-small">Ceren Ceylan</a>
    <div style="width: 80px;"></div>
</header>

<div class="read-container">
    <div class="chapter-header">
        <h1>"YÜZLEŞME"</h1>
    </div>

    <div class="poem">
        Buraya şiirini veya bölüm başı 
        alıntısını yazabilirsin.
    </div>

    <div class="content">
        Bölümün ana metni buraya gelecek. Paragraflar arasında birer boşluk bırakman yeterli, tasarım otomatik olarak onları düzenli gösterecektir.
    </div>

    <div class="chapter-nav">
        <a href="huma-bolum9.html" class="nav-btn">❮ ÖNCEKİ</a>
        
        <a href="huma-bolum11.html" class="nav-btn">SONRAKİ ❯</a>
    </div>
</div>

<footer>© 2024 CEREN CEYLAN</footer>

</body>
</html>
